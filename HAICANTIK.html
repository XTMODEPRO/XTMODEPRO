<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for You ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            z-index: 10;
        }

        h1 {
            color: #d63384;
            font-size: 24px;
        }

        p {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
        }

        .heart {
            color: #d63384;
            font-size: 50px;
            animation: heartbeat 1.2s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.25); }
            40% { transform: scale(1); }
            60% { transform: scale(1.15); }
            80% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        .btn-wa {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-wa:hover {
            background-color: #128c7e;
            transform: translateY(-3px);
        }

        /* Dekorasi Hati Melayang */
        .bg-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-hearts" id="hearts-container"></div>

    <div class="container">
        <div class="heart">❤️</div>
        <h1>Hai Cantik...</h1>
        <p>Sejujurnya, aku sudah lama ingin mengatakan ini. Kamu membuat hari-hariku jadi lebih berwarna.</p>
        <p><strong>Maukah kamu jadi pacarku?</strong></p>
        
        <a id="waLink" href="#" class="btn-wa">Kirim Jawaban ke Aku 💌</a>
    </div>

    <script>
        // Konfigurasi Nomor WhatsApp
        const nomorWA = "6283144549199";
        const pesan = "Hai! Aku sudah lihat webnya... Jawaban aku adalah: ";
        
        document.getElementById('waLink').href = `https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`;

        // Animasi hati sederhana untuk background
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '110vh';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.opacity = Math.random();
            heart.style.transition = 'transform 5s linear, opacity 5s';
            
            document.getElementById('hearts-container').appendChild(heart);

            setTimeout(() => {
                heart.style.transform = `translateY(-120vh) rotate(${Math.random() * 360}deg)`;
                heart.style.opacity = '0';
            }, 100);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 300);
    </script>
</body>
</html>
