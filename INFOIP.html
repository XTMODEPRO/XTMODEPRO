<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTMODEPRO IP CHECKER</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Container Ultra Protect Style */
        .tools-box {
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 350px;
            width: 100%;
            /* Neon Green Glow Effect */
            box-shadow: 0 0 10px #0f0, 0 0 20px #0f0, inset 0 0 5px #0f0;
        }

        .title {
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
        }

        /* Inner Box untuk Display IP */
        .inner-display {
            border: 1px dashed #0f0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
        }

        .ip-text {
            color: #0f0;
            font-size: 1.6rem;
            word-wrap: break-word;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        /* Tombol Copy Kecil (di dalam box) */
        .btn-copy {
            background-color: rgba(0, 255, 0, 0.1);
            color: #fff;
            border: 1px solid #0f0;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .btn-copy:active { background-color: rgba(0, 255, 0, 0.3); }

        /* Tombol Utama */
        .btn-action {
            display: block;
            width: 100%;
            background-color: #00ff00;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 10px #0f0;
            transition: 0.3s;
        }

        .btn-action:hover {
            box-shadow: 0 0 20px #0f0;
        }

        /* Animasi Loading sederhana */
        .ip-fetching { color: #888; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="tools-box">
        <div class="title">XTMODEPRO IP DIAGNOSTIC</div>

        <div class="inner-display">
            <p id="ip-display" class="ip-text ip-fetching">FETCHING...</p>
            <button class="btn-copy" onclick="copyIP()">📋 COPY IP</button>
        </div>

        <button class="btn-action" onclick="fetchIP()">CHECK ULANG / RESET IP</button>
    </div>

    <script>
        // Logika Pengambilan IP Real-time
        async function fetchIP() {
            const display = document.getElementById('ip-display');
            display.innerText = "REFRESHING...";
            display.classList.add('ip-fetching');

            try {
                // Menggunakan API ipapi.co (atau ipify jika hanya butuh text)
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                
                display.innerText = data.ip;
                display.classList.remove('ip-fetching');
                console.log("[!] Target IP Detected: " + data.ip);
            } catch (error) {
                display.innerText = "ERROR CONN";
                display.style.color = 'red';
                console.error("[!] Error Handling: Gagal mengambil data IP");
            }
        }

        // Fungsi Salin ke Clipboard
        function copyIP() {
            const ip = document.getElementById('ip-display').innerText;
            if(ip === "FETCHING..." || ip === "REFRESHING..." || ip === "ERROR CONN") return;

            navigator.clipboard.writeText(ip).then(() => {
                alert("IP ADDRESS BERHASIL DISALIN");
                console.log("[!] Target Data (IP) copied to clipboard.");
            });
        }

        // Jalankan saat load pertama kali
        fetchIP();
    </script>
</body>
</html>
