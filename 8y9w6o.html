<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTMODEPRO - Text Censor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700&family=Fira+Code:wght=400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #020208;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0 15px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ANIMASI BINTANG BACKGROUND --- */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .stars {
            width: 2px;
            height: 2px;
            background: transparent;
            box-shadow: 
                50px 100px #fff, 150px 300px #fff, 250px 50px #fff, 350px 450px #fff,
                80px 500px #fff, 200px 200px #fff, 300px 600px #fff, 400px 150px #fff,
                120px 700px #fff, 280px 350px #fff, 220px 750px #fff, 310px 100px #ffffffa0,
                450px 550px #fff, 190px 480px #fff, 60px 250px #ffffff80, 380px 280px #fff;
            animation: animateStars 40s linear infinite;
        }

        .stars-twinkle {
            width: 3px;
            height: 3px;
            background: transparent;
            box-shadow: 
                30px 150px #fff, 180px 50px #ffffffab, 260px 400px #fff, 330px 250px #fff,
                90px 650px #fff, 130px 320px #fff, 390px 700px #fff, 210px 580px #fff;
            animation: animateStars 25s linear infinite, twinkle 3s ease-in-out infinite alternate;
        }

        @keyframes animateStars {
            from { transform: translateY(0px); }
            to { transform: translateY(-800px); }
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* --- CONTAINER UTAMA --- */
        .container {
            width: 100%;
            max-width: 480px;
            padding-bottom: 40px;
            position: relative;
            z-index: 2;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .hero {
            text-align: center;
            margin-top: 25px;
            margin-bottom: 30px;
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            color: #1e90ff; 
            text-shadow: 0 0 15px rgba(30, 144, 255, 0.4);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #cccccc;
            font-size: 13px;
            line-height: 1.5;
        }

        /* --- PANEL MESIN SENSOR (GLASSMORPHISM) --- */
        .censor-box {
            background-color: rgba(8, 8, 8, 0.65); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8e8e93;
        }

        textarea {
            width: 100%;
            height: 100px;
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: #ffffff;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #1e90ff;
        }

        /* --- OUTPUT AREA --- */
        .output-container {
            position: relative;
            background-color: rgba(10, 10, 20, 0.5);
            border: 1px dashed rgba(30, 144, 255, 0.3);
            border-radius: 10px;
            padding: 14px;
            min-height: 80px;
        }

        .output-text {
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: #00ffcc;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .btn-copy {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-copy:hover {
            background-color: #1e90ff;
            border-color: #1e90ff;
        }

        /* --- METODE SENSOR TOGGLE (OPSI TAMBAHAN) --- */
        .mode-container {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #a0a0a0;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: #6a0dad;
            border-color: #6a0dad;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(106, 13, 173, 0.4);
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 11px;
            color: #444446;
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="stars"></div>
        <div class="stars-twinkle"></div>
    </div>

    <div class="container">
        
        <nav>
            <div class="brand">XTMODEPRO</div>
            <div class="label" style="color: #00ffcc;">Online Tools</div>
        </nav>

        <div class="hero">
            <h1 class="title">Text Obfuscator</h1>
            <p class="subtitle">Bypass filter kata atau manipulasi teks secara instan dengan algoritma karakter alternatif.</p>
        </div>

        <div class="censor-box">
            
            <div class="label">Pilih Mode Manipulasi</div>
            <div class="mode-container">
                <button class="mode-btn active" onclick="changeMode('leetspeak')">Leet (a->0, e->3)</button>
                <button class="mode-btn" onclick="changeMode('asterisk')">Bintang (H*lo)</button>
            </div>

            <div class="label">Input Teks Kamu</div>
            <textarea id="inputText" placeholder="Ketik sesuatu di sini..." oninput="processText()"></textarea>

            <div class="label">Hasil Sensor</div>
            <div class="output-container">
                <button class="btn-copy" onclick="copyResult()">Copy</button>
                <div id="outputText" class="output-text">...</div>
            </div>

        </div>

        <footer>
            &copy; 2026 XTMODEPRO ENGINE.
        </footer>

    </div>

    <script>
        let currentMode = 'leetspeak';

        function changeMode(mode) {
            currentMode = mode;
            // Update UI Button active class
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            // Re-proses teks yang sudah ada
            processText();
        }

        function processText() {
            const input = document.getElementById('inputText').value;
            const outputElement = document.getElementById('outputText');
            
            if (input.trim() === "") {
                outputElement.innerText = "...";
                return;
            }

            let result = "";

            if (currentMode === 'leetspeak') {
                // Algoritma mengganti vokal menjadi angka sesuai contoh request kamu (Halo semua -> Hal0 s0m0a)
                // Di sini saya petakan 'a' ke '0', 'u' ke '0' dsb agar mirip struktur ketikan yang kamu minta.
                result = input
                    .replace(/[aA]/g, '0')
                    .replace(/[uU]/g, '0')
                    .replace(/[oO]/g, '0')
                    .replace(/[eE]/g, '0')
                    .replace(/[iI]/g, '1');
            } else if (currentMode === 'asterisk') {
                // Mode alternatif memotong huruf vokal tengah menjadi bintang (*)
                result = input.replace(/[aeiouAEIOU]/g, '*');
            }

            outputElement.innerText = result;
        }

        function copyResult() {
            const outputText = document.getElementById('outputText').innerText;
            if(outputText === "...") return;
            
            navigator.clipboard.writeText(outputText).then(() => {
                const copyBtn = document.querySelector('.btn-copy');
                copyBtn.innerText = "Copied!";
                setTimeout(() => {
                    copyBtn.innerText = "Copy";
                }, 1500);
            });
        }
    </script>

</body>
</html>
