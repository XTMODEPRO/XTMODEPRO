<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTMODEPRO - Access Portal</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #0a0e17; color: white; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; box-sizing: border-box; }
        .login-card { background: #161b29; padding: 40px; border-radius: 20px; text-align: center; width: 300px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #0d1117; color: white; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; margin-top: 20px; border-radius: 8px; border: none; background: linear-gradient(90deg, #6a11cb, #2575fc); color: white; font-weight: bold; cursor: pointer; }
        #contentWrapper { display: none; text-align: center; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; flex-direction: column; justify-content: center; align-items: center; }
        .top-elements { margin-bottom: 20px; }
        h1 { margin: 0 0 10px 0; font-size: 1.5rem; }
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 8px; background: #e91e63; color: white; font-weight: bold; transition: 0.2s;}
        button:active { transform: scale(0.95); }
        #imageResult { max-width: 100%; max-height: calc(100vh - 120px); width: auto; height: auto; object-fit: contain; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: none; }
    </style>
</head>
<body>

    <div id="loginWrapper" class="login-card">
        <h1>XTMODEPRO</h1>
        <input type="text" id="username" placeholder="USERNAME">
        <input type="password" id="password" placeholder="PASSWORD">
        <button class="btn-login" onclick="checkLogin()">LOGIN</button>
    </div>

    <div id="contentWrapper">
        <div class="top-elements">
            <h1>System Premium</h1>
            <div class="button-container">
                <button onclick="loadContent('gangbang')">Gangbang</button>
                <button onclick="loadContent('girl')">Girl</button>
                <button onclick="loadContent('kasedaiki')">Kasedaiki</button>
            </div>
        </div>
        <img id="imageResult" src="" alt="Hasil gambar">
    </div>

    <script>
        // TIDAK ADA fungsi pengecekan sesi di sini, 
        // sehingga halaman selalu reset ke posisi awal saat dimuat ulang.

        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === "XTMODEPRO" && pass === "VIP") {
                document.getElementById('loginWrapper').style.display = 'none';
                document.getElementById('contentWrapper').style.display = 'flex'; 
            } else {
                alert("Kredensial Salah!");
            }
        }

        async function loadContent(type) {
            const display = document.getElementById('imageResult');
            const apis = {
                'gangbang': 'https://nekobot.xyz/api/image?type=tentacle',
                'kasedaiki': 'https://nekobot.xyz/api/image?type=hkitsune',
                'girl': 'https://nekobot.xyz/api/image?type=thigh'
            };

            try {
                display.style.display = 'none';
                const response = await fetch(apis[type]);
                const data = await response.json();
                display.src = data.message;
                display.style.display = 'block';
            } catch (error) {
                alert("Gagal memuat.");
            }
        }
    </script>
</body>
</html>
