<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTMODEPRO - Simulasi Edukasi Bahaya Slot</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff003c;
            --primary-glow: rgba(255, 0, 60, 0.4);
            --bg-dark: #070709;
            --panel-bg: #111116;
            --border-color: #1f1f27;
            --win-color: #00ff66;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            background-image: linear-gradient(rgba(255, 0, 60, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 60, 0.01) 1px, transparent 1px);
            background-size: 25px 25px;
            padding-bottom: 50px;
        }

        header {
            background: #111116;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 15px rgba(255, 0, 60, 0.2);
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #fff;
        }

        header span {
            color: var(--primary);
        }

        .container {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Info Saldo & Status */
        .status-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--win-color);
            margin: 5px 0;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
            transition: color 0.3s;
        }

        .system-alert {
            font-size: 0.85rem;
            color: #ffaa00;
            font-weight: bold;
            min-height: 20px;
        }

        /* Mesin Slot UI */
        .slot-machine {
            background: #161622;
            border: 3px solid var(--primary);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 0 25px var(--primary-glow);
            margin-bottom: 25px;
        }

        .reel-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            background: #000;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2d2d3f;
        }

        .reel {
            flex: 1;
            background: linear-gradient(#111, #222, #111);
            height: 100px;
            border-radius: 6px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            transition: transform 0.1s ease;
        }

        /* Control Panel */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bet-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            background: #111116;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .btn-spin {
            background: linear-gradient(135deg, #ff003c, #b3002a);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 60, 0.4);
            transition: transform 0.1s, opacity 0.3s;
        }

        .btn-spin:active {
            transform: scale(0.98);
        }

        .btn-spin:disabled {
            background: #333;
            box-shadow: none;
            cursor:not-allowed;
            opacity: 0.5;
        }

        /* Log / Edukasi Edu-box */
        .edu-box {
            background: rgba(255, 0, 60, 0.05);
            border: 1px dashed var(--primary);
            border-radius: 12px;
            padding: 15px;
            margin-top: 25px;
            display: none;
        }

        .edu-box h3 {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--primary);
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .edu-box p {
            font-size: 0.85rem;
            color: #ccc;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1><span>XTMODEPRO</span> SLOT SIMULATION ALGORITHM</h1>
    </header>

    <div class="container">
        
        <!-- Panel Monitor Saldo -->
        <div class="status-panel">
            <div class="balance-label">Total Saldo Akun Pemain</div>
            <div class="balance-amount" id="balanceDisplay">Rp 10,000</div>
            <div class="system-alert" id="statusMessage">Klik SPIN untuk memulai simulasi</div>
        </div>

        <!-- Wadah Simbol Slot -->
        <div class="slot-machine">
            <div class="reel-container">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">👑</div>
                <div class="reel" id="reel3">💎</div>
            </div>
        </div>

        <!-- Kontrol Taruhan -->
        <div class="controls">
            <div class="bet-info">
                <span>Jumlah Taruhan (BET):</span>
                <span style="color: #ffaa00; font-weight: bold;" id="betDisplay">Rp 2,000</span>
            </div>
            <button class="btn-spin" id="spinBtn" onclick="startSpin()">SPIN SEKARANG</button>
        </div>

        <!-- Kotak Edukasi Realita Sistem -->
        <div class="edu-box" id="eduBox">
            <h3><i class="fa-solid fa-triangle-exclamation"></i> KEBENARAN ALGORITMA BANDAR:</h3>
            <p id="eduText"></p>
        </div>

    </div>

    <script>
        let balance = 10000;
        let bet = 2000;
        let spinCount = 0;
        const symbols = ['💎', '👑', '🍒', '🍋', '7️⃣'];

        // Alur manipulasi psikologis bandar judol
        function startSpin() {
            if (balance < bet) {
                alert("Saldo habis!");
                return;
            }

            spinCount++;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('statusMessage').innerText = "Mengacak pola simbol...";

            // Mengurangi saldo untuk taruhan
            balance -= bet;
            updateDisplay();

            // Efek acak visual palsu sejenak (tanpa loading lama)
            let counter = 0;
            let interval = setInterval(() => {
                document.getElementById('reel1').innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById('reel2').innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById('reel3').innerText = symbols[Math.floor(Math.random() * symbols.length)];
                counter++;
                if (counter > 8) {
                    clearInterval(interval);
                    determineResult();
                }
            }, 60);
        }

        function determineResult() {
            let winAmount = 0;
            let message = "";
            let r1, r2, r3;

            // FASE 1: MEMBERI KEMENANGAN MANIS (Manipulasi agar merasa beruntung)
            if (spinCount === 1) {
                r1 = r2 = r3 = '🍒'; winAmount = 100000; 
                message = "🎉 MAXWIN! Kemenangan Pemula Aktif!";
            } else if (spinCount === 2) {
                r1 = r2 = r3 = '🍋'; winAmount = 2500000;
                message = "🎉 SENSATIONAL! Pola Akun Gacor!";
            } else if (spinCount === 3) {
                r1 = r2 = r3 = '👑'; winAmount = 35000000;
                message = "🎉 SUPER WIN! Naikkan nilai taruhan!";
            } else if (spinCount === 4) {
                // Diatur agar menyentuh angka target Rp 100.000.000+
                r1 = r2 = r3 = '💎'; winAmount = 75000000;
                message = "🔥 ULTRA MAXWIN! Saldo Anda Tembus 100 JUTA!";
                bet = 10000000; // Bandar otomatis menaikkan standar bet pemain
            } 
            // FASE 2: SISTEM PENGUNCIAN AKUN (Pasti Kalah Total)
            else {
                // Memberikan simbol acak yang tidak pernah kembar tiga
                r1 = '7️⃣'; r2 = '🍒'; r3 = '💎';
                winAmount = 0;
                message = "❌ Zonk! Coba lagi, sisa sedikit lagi scatter!";
                
                // Menghabiskan sisa uang dengan cepat akibat bet besar
                if (balance < bet) {
                    bet = balance; // Pasang semua sisa uang (All-in pasrah)
                }
            }

            // Terapkan simbol hasil setelan bandar
            document.getElementById('reel1').innerText = r1;
            document.getElementById('reel2').innerText = r2;
            document.getElementById('reel3').innerText = r3;

            // Tambahkan hasil kemenangan ke saldo
            balance += winAmount;
            updateDisplay();

            document.getElementById('statusMessage').innerText = message;
            showEducationalText();

            // Kontrol tombol spin kembali jika belum bangkrut total
            if (balance > 0) {
                document.getElementById('spinBtn').disabled = false;
            } else {
                document.getElementById('statusMessage').innerText = "💀 BANGKRUT TOTAL! SALDO RP 0";
                document.getElementById('balanceDisplay').style.color = "#ff003c";
                document.getElementById('spinBtn').innerText = "AKUN DIKUNCI BANDAR";
            }
        }

        function updateDisplay() {
            document.getElementById('balanceDisplay').innerText = "Rp " + balance.toLocaleString('id-ID');
            document.getElementById('betDisplay').innerText = "Rp " + bet.toLocaleString('id-ID');
        }

        function showEducationalText() {
            const eduBox = document.getElementById('eduBox');
            const eduText = document.getElementById('eduText');
            eduBox.style.display = "block";

            if (spinCount <= 4) {
                eduText.innerHTML = `Di awal permainan, sistem algoritma sengaja diatur <b>100% menang</b> oleh bandar. Tujuannya adalah memicu hormon dopamin di otak Anda agar merasa tak terkalahkan dan percaya bahwa situs ini 'gacor'.`;
            } else if (balance > 0) {
                eduText.innerHTML = `Sekarang sistem <b>Pasti Kalah (Lock Akun)</b> telah diaktifkan secara otomatis di server pusat. Berapa pun modal yang Anda masukkan, Anda tidak akan pernah menang lagi karena bandar sedang menguras semua uang Anda secara perlahan.`;
            } else {
                eduText.innerHTML = `<b>Uang Anda Habis!</b> Inilah akhir dari seluruh pemain judi online. Kemenangan Rp 100 Juta di awal hanyalah angka angka angka palsu di layar komputer untuk menjebak Anda hingga jatuh miskin secara nyata.`;
            }
        }
    </script>
</body>
</html>
