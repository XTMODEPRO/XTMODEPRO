<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ XT-HTML INJECTOR MINIMALIST v5.0 ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        /* KUNCI UKURAN VIEWPORT - ANTI GESER KEYBOARD */
        html, body { 
            overscroll-behavior: none; 
            overflow: hidden; 
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            height: 100% !important;
            width: 100% !important;
            margin: 0;
            padding: 0;
            background-color: #090d16; /* Warna gelap premium */
        }

        .font-sans { font-family: 'Inter', sans-serif; }
        .font-neon { font-family: 'Orbitron', sans-serif; }
        .font-code { font-family: 'Fira Code', monospace; }
        
        .btn-floating-back {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 999999;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        /* --- PRELOADER LAYER SYSTEM --- */
        #system-preloader {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #090d16;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        /* Ring Minimalis Modern */
        .loader-ring {
            position: relative;
            width: 120px;
            height: 120px;
            border: 2px solid rgba(6, 182, 212, 0.1);
            border-top: 2px solid #06b6d4;
            border-radius: 50%;
            animation: rotateRing 1s linear infinite;
        }
        @keyframes rotateRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* BAR PROGRESS */
        .progress-bar-container {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 99px;
            overflow: hidden;
        }

        /* WADAH UTAMA FORM (STANDAR FIX UNTUK MOBILTY) */
        #menu-utama {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* PANEL KOTAK SIMPEL & PROFESIONAL */
        .premium-box {
            position: relative;
            background: #0f172a; /* Solid Slate Dark */
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5),
                        0 0 30px rgba(6, 182, 212, 0.05);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.3); border-radius: 99px; }
    </style>
</head>
<body class="text-slate-200 font-sans select-none">

    <div id="system-preloader">
        <div class="flex flex-col items-center gap-6">
            <div class="relative flex items-center justify-center">
                <div class="loader-ring"></div>
                <div id="loading-percentage" class="absolute text-xl font-neon font-bold text-cyan-400">0%</div>
            </div>
            
            <div class="text-center flex flex-col gap-1.5">
                <div id="loading-status-text" class="text-xs font-code tracking-widest text-slate-400 uppercase">Booting Engine...</div>
            </div>

            <div class="progress-bar-container">
                <div id="progress-fill" class="h-full bg-cyan-500 transition-all duration-700 linear" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div id="wrapper-fullscreen" class="hidden fixed inset-0 w-full h-full bg-white z-[9999]">
        <button onclick="keluarFullscreen()" class="btn-floating-back bg-rose-600 hover:bg-rose-500 text-white font-bold text-xs px-3 py-2 rounded-xl transition flex items-center gap-1.5 border border-rose-400">
            <i class="fa-solid fa-arrow-left"></i> KEMBALI
        </button>
        <iframe id="frameFullscreen" class="w-full h-full border-none m-0 p-0"></iframe>
    </div>

    <div id="menu-utama" class="opacity-0 transition-opacity duration-500">
        
        <header class="border-b border-slate-900 py-4 px-6 w-full shrink-0 bg-[#090d16]">
            <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2">
                <h1 class="text-xl font-neon font-bold tracking-widest text-white">
                    <span class="text-cyan-400">XT</span> INJECTOR
                </h1>
                <div class="flex items-center gap-2 text-[11px] font-code text-slate-400 bg-slate-900/60 border border-slate-800/50 rounded-md px-2.5 py-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span>SYSTEM ONLINE</span>
                </div>
            </div>
        </header>

        <main class="max-w-md w-full mx-auto p-4 flex-grow flex flex-col justify-center items-center my-auto">
            <div class="premium-box rounded-xl p-5 flex flex-col gap-4 w-full">
                
                <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-cyan-500 to-transparent"></div>
                
                <div class="flex flex-col gap-2">
                    <h2 class="text-xs font-semibold text-slate-400 tracking-wider flex items-center gap-2 uppercase">
                        <i class="fa-solid fa-terminal text-cyan-400"></i> Kode Sumber HTML:
                    </h2>
                    
                    <div class="flex items-center justify-between gap-2 w-full bg-slate-950 p-1 rounded-lg border border-slate-900">
                        <label class="flex-1 cursor-pointer text-center py-1.5 text-xs font-code bg-slate-900 hover:bg-slate-850 border border-slate-800/80 text-slate-300 rounded-md transition duration-150 flex items-center justify-center gap-1">
                            <i class="fa-solid fa-file-import text-[10px] text-cyan-400"></i> Import
                            <input type="file" id="importFile" accept=".html,.txt" class="hidden" onchange="handleFileImport(this)">
                        </label>
                        <button onclick="clearInput()" class="flex-1 py-1.5 text-xs font-code bg-slate-900 border border-slate-800/80 text-slate-300 hover:text-rose-400 rounded-md transition duration-150">
                            Clear
                        </button>
                        <button onclick="loadSample()" class="flex-1 py-1.5 text-xs font-code bg-slate-900 border border-slate-800/80 text-slate-300 hover:text-amber-400 rounded-md transition duration-150">
                            Contoh
                        </button>
                    </div>
                </div>

                <div id="loadStatus" class="hidden text-[11px] font-code text-center text-amber-400 bg-amber-500/5 border border-amber-500/10 py-1.5 rounded-md"></div>

                <textarea id="rawHtmlCode" placeholder="Masukkan atau tempel kode HTML Anda di sini..." class="w-full h-56 bg-slate-950 border border-slate-900 rounded-xl p-3.5 text-xs font-code text-cyan-300 focus:outline-none focus:border-cyan-500/40 transition resize-none leading-relaxed shadow-inner"></textarea>
                
                <button onclick="masukFullscreen()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-3 rounded-lg transition duration-150 text-xs tracking-wider font-neon border border-cyan-400/20 shadow-lg shadow-cyan-950/20">
                    LAUNCH APPLICATION
                </button>
            </div>
        </main>

        <footer class="text-center py-4 text-[9px] text-slate-600 font-mono tracking-widest uppercase w-full shrink-0">
            &copy; 2026 XTMODEPRO // SECURE CORE INTERFACE
        </footer>
    </div>

    <script>
        // --- 1. SIMULASI BOOTING LOADING SYSTEM (Otomatis & Terasa Profesional) ---
        function runPreloader() {
            let progress = 0;
            const percentText = document.getElementById('loading-percentage');
            const fillProgress = document.getElementById('progress-fill');
            const statusText = document.getElementById('loading-status-text');

            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 15) + 5; // Naik acak agar terlihat natural
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    percentText.innerText = '100%';
                    fillProgress.style.width = '100%';
                    statusText.innerText = "READY";

                    // Transisi buka menu utama
                    setTimeout(() => {
                        document.getElementById('system-preloader').style.opacity = '0';
                        document.getElementById('system-preloader').style.visibility = 'hidden';
                        document.getElementById('menu-utama').classList.remove('opacity-0');
                    }, 400);
                } else {
                    percentText.innerText = progress + '%';
                    fillProgress.style.width = progress + '%';
                    
                    if (progress < 40) statusText.innerText = "RESOLVING FILES...";
                    else if (progress < 80) statusText.innerText = "MOUNTING CORE UI...";
                    else statusText.innerText = "LAUNCHING V5.0...";
                }
            }, 90);
        }

        window.addEventListener('DOMContentLoaded', runPreloader);

        // --- 2. ANTI-LAG PROTECTION STORAGE ---
        let rawStorageData = "";

        function handleFileImport(input) {
            const file = input.files[0];
            if (!file) return;

            const statusLabel = document.getElementById('loadStatus');
            statusLabel.innerText = "⏳ Memproses berkas data besar...";
            statusLabel.classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = function(e) {
                rawStorageData = e.target.result;
                const textArea = document.getElementById('rawHtmlCode');
                textArea.value = ""; 

                const limitPreview = 80000;
                if (rawStorageData.length > limitPreview) {
                    textArea.value = rawStorageData.substring(0, limitPreview) + "\n\n... [SISTEM ANTI-LAG ACTIVE: Kode lengkap aman disimpan di memori RAM internal, sistem siap eksekusi tanpa lag]";
                    statusLabel.innerText = `✅ Berkas Dimuat: ${(rawStorageData.length / 1024).toFixed(1)} KB`;
                } else {
                    textArea.value = rawStorageData;
                    statusLabel.classList.add('hidden');
                }
            };
            reader.readAsText(file);
        }

        // --- 3. CORE RUN SYSTEM FULLSCREEN ---
        function masukFullscreen() {
            let kodeStr = "";
            const currentText = document.getElementById('rawHtmlCode').value;
            
            if (rawStorageData && currentText.includes('SISTEM ANTI-LAG ACTIVE')) {
                kodeStr = rawStorageData;
            } else {
                kodeStr = currentText.trim();
            }
            
            if (!kodeStr) {
                alert('⚠️ Silakan masukkan atau import kode HTML terlebih dahulu!');
                return;
            }

            const wrapper = document.getElementById('wrapper-fullscreen');
            const frame = document.getElementById('frameFullscreen');
            
            wrapper.classList.remove('hidden');
            document.getElementById('menu-utama').classList.add('hidden');

            try {
                const frameDoc = frame.contentDocument || frame.contentWindow.document;
                frameDoc.open();
                frameDoc.write(kodeStr);
                frameDoc.close();
            } catch (error) {
                alert('🚨 Gagal memproses struktur dokumen HTML!');
                console.error(error);
            }
        }

        function keluarFullscreen() {
            document.getElementById('wrapper-fullscreen').classList.add('hidden');
            document.getElementById('menu-utama').classList.remove('hidden');

            const frame = document.getElementById('frameFullscreen');
            const frameDoc = frame.contentDocument || frame.contentWindow.document;
            frameDoc.open();
            frameDoc.write('');
            frameDoc.close();
        }

        function clearInput() {
            document.getElementById('rawHtmlCode').value = '';
            rawStorageData = "";
            document.getElementById('loadStatus').classList.add('hidden');
            document.getElementById('importFile').value = '';
        }

        function loadSample() {
            document.getElementById('loadStatus').classList.add('hidden');
            rawStorageData = "";
            
            const contohKode = [
                '<!DOCTYPE html>',
                '<html>',
                '<head>',
                '    <title>Situs Tes</title>',
                '    <style>',
                '        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding-top: 15%; margin:0; }',
                '        h1 { color: #00ffcc; font-size: 2.2rem; text-shadow: 0 0 10px #00ffcc; }',
                '        p { color: #888; font-size: 1rem; }',
                '    </style>',
                '</head>',
                '<body>',
                '    <h1>SYSTEM INJECT SUCCESS</h1>',
                '    <p>Ini adalah tampilan halaman penuh (Full-Screen) dari HTML yang kamu paste.</p>',
                '</body>',
                '</html>'
            ].join('\n');

            document.getElementById('rawHtmlCode').value = contohKode;
        }
    </script>
</body>
</html>
