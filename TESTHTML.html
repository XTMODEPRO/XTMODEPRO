<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ XT-HTML INJECTOR ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Fira+Code:wght@400;600&display=swap');
        .font-cyber { font-family: 'Rajdhani', sans-serif; }
        .font-neon { font-family: 'Orbitron', sans-serif; }
        .font-code { font-family: 'Fira Code', monospace; }
        
        /* Tombol kembali melayang dengan efek neon */
        .btn-floating-back {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 999999;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        /* Background Canvas Styling */
        #space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0b0f19 0%, #020617 100%);
        }
    </style>
</head>
<body class="text-slate-100 font-cyber min-h-screen relative overflow-x-hidden">

    <canvas id="space-bg"></canvas>

    <div id="wrapper-fullscreen" class="hidden fixed inset-0 w-full h-full bg-white z-[9999]">
        <button onclick="keluarFullscreen()" class="btn-floating-back bg-rose-600 hover:bg-rose-500 text-white font-bold text-xs px-3 py-2 rounded-xl transition flex items-center gap-1.5 border border-rose-400">
            <i class="fa-solid fa-arrow-left"></i> KEMBALI
        </button>
        <iframe id="frameFullscreen" class="w-full h-full border-none"></iframe>
    </div>

    <div id="menu-utama" class="flex flex-col justify-between min-h-screen relative z-10">
        <header class="bg-slate-900/80 backdrop-blur-md border-b border-cyan-500/30 py-4 px-6 shadow-[0_4px_20px_rgba(6,182,212,0.15)]">
            <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2">
                <h1 class="text-2xl font-neon font-bold tracking-widest text-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.4)]">
                    <i class="fa-solid fa-expand text-amber-400 mr-1 animate-pulse"></i> XT-FULL INJECTOR
                </h1>
                <div class="flex items-center gap-2 text-xs font-code text-slate-400 bg-slate-950 px-3 py-1.5 border border-slate-800 rounded-lg">
                    <span class="w-2 h-2 rounded-full bg-cyan-400 animate-ping"></span>
                    <span>READY TO RUN</span>
                </div>
            </div>
        </header>

        <main class="max-w-4xl w-full mx-auto p-4 flex-grow flex flex-col justify-center my-4">
            <div class="bg-slate-900/90 backdrop-blur-md border border-slate-800 rounded-2xl p-6 shadow-2xl relative overflow-hidden flex flex-col gap-4">
                <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-cyan-500 via-blue-500 to-transparent"></div>
                
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                    <h2 class="text-md font-bold text-slate-300 tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-paste text-cyan-400"></i> INPUT KODE HTML KAMU:
                    </h2>
                    <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                        <label class="cursor-pointer px-3 py-1 text-xs font-code bg-cyan-950/50 border border-cyan-800 text-cyan-400 hover:bg-cyan-500/20 rounded-lg transition flex items-center gap-1">
                            <i class="fa-solid fa-file-import"></i> Import File
                            <input type="file" id="importFile" accept=".html,.txt" class="hidden" onchange="handleFileImport(this)">
                        </label>
                        <button onclick="clearInput()" class="px-3 py-1 text-xs font-code bg-slate-950 border border-slate-800 text-rose-400 hover:bg-rose-500/10 rounded-lg transition">
                            <i class="fa-solid fa-eraser"></i> Clear
                        </button>
                        <button onclick="loadSample()" class="px-3 py-1 text-xs font-code bg-slate-950 border border-slate-800 text-amber-400 hover:bg-amber-500/10 rounded-lg transition">
                            <i class="fa-solid fa-file-code"></i> Contoh
                        </button>
                    </div>
                </div>

                <div id="loadStatus" class="hidden text-xs font-code text-amber-400 animate-pulse"></div>

                <textarea id="rawHtmlCode" placeholder="Paste kode HTML di sini, atau gunakan fitur Import File jika teks terlalu panjang..." class="w-full h-80 bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs font-code text-emerald-400 focus:outline-none focus:border-cyan-500 transition resize-none leading-relaxed shadow-inner"></textarea>
                
                <button onclick="masukFullscreen()" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 rounded-xl transition duration-300 shadow-[0_4px_15px_rgba(6,182,212,0.3)] flex items-center justify-center gap-2 text-md tracking-wider font-neon">
                    <i class="fa-solid fa-play animate-bounce text-xs"></i> LAUNCH SYSTEM (FULL SCREEN)
                </button>
            </div>
        </main>

        <footer class="text-center py-4 text-[10px] text-slate-600 font-mono tracking-widest uppercase border-t border-slate-900/50 backdrop-blur-sm">
            &copy; 2026 XTMODEPRO // FULLSCREEN VIEW SYSTEM ENGINE
        </footer>
    </div>

    <script>
        // --- 1. ENGINE BACKGROUND GALAKSI & BINTANG BERGERAK (CANVAS) ---
        const canvas = document.getElementById('space-bg');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const numStars = 150;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Inisialisasi properti objek bintang
        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5 + 0.5,
                // Kecepatan gerak bintang
                vx: (Math.random() - 0.5) * 0.2,
                vy: Math.random() * 0.3 + 0.1,
                alpha: Math.random(),
                dAlpha: (Math.random() * 0.02) + 0.01
            });
        }

        function drawGalaxy() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Efek Nebula/Galaksi di tengah latar
            let gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 10, canvas.width/2, canvas.height/2, canvas.width);
            gradient.addColorStop(0, '#0f172a');
            gradient.addColorStop(0.5, '#070a13');
            gradient.addColorStop(1, '#020617');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Render komponen bintang
            for (let i = 0; i < numStars; i++) {
                let s = stars[i];
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(34, 211, 238, ${s.alpha})`; // Warna cyan neon khas XT
                ctx.fill();

                // Update posisi (gerak ke bawah lambat)
                s.x += s.vx;
                s.y += s.vy;
                
                // Animasi kelap-kelip (twinkle)
                s.alpha += s.dAlpha;
                if (s.alpha <= 0 || s.alpha >= 1) s.dAlpha = -s.dAlpha;

                // Reset posisi jika keluar dari layar viewport
                if (s.y > canvas.height) {
                    s.y = 0;
                    s.x = Math.random() * canvas.width;
                }
                if (s.x < 0 || s.x > canvas.width) {
                    s.vx = -s.vx;
                }
            }
            requestAnimationFrame(drawGalaxy);
        }
        drawGalaxy();


        // --- 2. ENGINE ANTI-LAG & FILE IMPORT MANAGEMENT ---
        let rawStorageData = ""; // Penyimpanan memori internal untuk string teks raksasa

        function handleFileImport(input) {
            const file = input.files[0];
            if (!file) return;

            const statusLabel = document.getElementById('loadStatus');
            statusLabel.innerText = "⏳ Memproses data file besar, harap tunggu...";
            statusLabel.classList.remove('hidden');

            const reader = new FileReader();
            
            reader.onload = function(e) {
                rawStorageData = e.target.result;
                
                // Implementasi Mekanisme Anti-Lag (Lazy Text Chunky Rendering)
                const textArea = document.getElementById('rawHtmlCode');
                textArea.value = ""; // Bersihkan tampilan penampung visual

                const limitPreview = 150000; // Hanya tampilkan 150K karakter pertama di UI textarea agar browser tidak freeze
                if (rawStorageData.length > limitPreview) {
                    textArea.value = rawStorageData.substring(0, limitPreview) + "\n\n... [TEKS BESAR TERDETEKSI: Sisa kode disembunyikan di sistem UI agar anti-lag, namun tetap valid dan siap di-inject!]";
                    statusLabel.innerText = `✅ Berhasil memuat file raksasa (${(rawStorageData.length / 1024).toFixed(1)} KB) dengan mode proteksi RAM.`;
                } else {
                    textArea.value = rawStorageData;
                    statusLabel.classList.add('hidden');
                }
            };

            reader.readAsText(file);
        }


        // --- 3. FUNGSI UTAMA INJECT ENGINE ---
        function masukFullscreen() {
            // Gunakan data dari internal storage jika ada data import file besar, jika tidak pakai nilai textarea langsung
            let kodeStr = rawStorageData && document.getElementById('rawHtmlCode').value.includes('[TEKS BESAR TERDETEKSI') 
                ? rawStorageData 
                : document.getElementById('rawHtmlCode').value.trim();
            
            if (!kodeStr) {
                alert('⚠️ Gagal mengeksekusi! Harap paste atau import kode HTML terlebih dahulu!');
                return;
            }

            const wrapper = document.getElementById('wrapper-fullscreen');
            const frame = document.getElementById('frameFullscreen');
            
            wrapper.classList.remove('hidden');
            document.getElementById('menu-utama').classList.add('hidden');

            try {
                const frameDoc = frame.contentDocument || frame.contentWindow.document;
                frameDoc.open();
                frameDoc.write(kodeStr);
                frameDoc.close();
            } catch (error) {
                alert('🚨 Terjadi error saat memproses struktur kode!');
                console.error(error);
            }
        }

        function keluarFullscreen() {
            const wrapper = document.getElementById('wrapper-fullscreen');
            const frame = document.getElementById('frameFullscreen');
            
            wrapper.classList.add('hidden');
            document.getElementById('menu-utama').classList.remove('hidden');

            const frameDoc = frame.contentDocument || frame.contentWindow.document;
            frameDoc.open();
            frameDoc.write('');
            frameDoc.close();
        }

        function clearInput() {
            document.getElementById('rawHtmlCode').value = '';
            rawStorageData = "";
            document.getElementById('loadStatus').classList.add('hidden');
            document.getElementById('importFile').value = '';
        }

        function loadSample() {
            document.getElementById('loadStatus').classList.add('hidden');
            rawStorageData = "";
            document.getElementById('rawHtmlCode').value = `<!DOCTYPE html>
<html>
<head>
    <title>Situs Tes</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding-top: 15%; }
        h1 { color: #00ffcc; font-size: 3rem; text-shadow: 0 0 10px #00ffcc; }
        p { color: #888; }
    </style>
</head>
<body>
    <h1>SYSTEM SUKSES INJECT</h1>
    <p>Ini adalah tampilan halaman penuh (Full-Screen) dari HTML yang kamu paste.</p>

    <script>
        document.oncontextmenu = null;
        document.onkeydown = null;
        document.onselectstart = null;
        console.log("XTMODEPRO BYPASS SYSTEM ACTIVE");
    <\/script>
</body>
</html>`;
        }
    </script>
</body>
</html>
