<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ XT-HTML INJECTOR FULLSCREEN v2.0 ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Fira+Code:wght@400;600&display=swap');
        .font-cyber { font-family: 'Rajdhani', sans-serif; }
        .font-neon { font-family: 'Orbitron', sans-serif; }
        .font-code { font-family: 'Fira Code', monospace; }
        
        /* Tombol kembali melayang dengan efek neon */
        .btn-floating-back {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 999999;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-cyber min-h-screen">

    <div id="wrapper-fullscreen" class="hidden fixed inset-0 w-full h-full bg-white z-[9999]">
        <button onclick="keluarFullscreen()" class="btn-floating-back bg-rose-600 hover:bg-rose-500 text-white font-bold text-xs px-3 py-2 rounded-xl transition flex items-center gap-1.5 border border-rose-400">
            <i class="fa-solid fa-arrow-left"></i> KEMBALI
        </button>
        <iframe id="frameFullscreen" class="w-full h-full border-none m-0 p-0 bg-white"></iframe>
    </div>


    <div id="menu-utama" class="flex flex-col justify-between min-h-screen">
        <header class="bg-slate-900 border-b border-cyan-500/30 py-4 px-6 shadow-[0_4px_20px_rgba(6,182,212,0.15)]">
            <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2">
                <h1 class="text-2xl font-neon font-bold tracking-widest text-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.4)]">
                    <i class="fa-solid fa-expand text-amber-400 mr-1 animate-pulse"></i> XT-FULL INJECTOR
                </h1>
                <div class="flex items-center gap-2 text-xs font-code text-slate-400 bg-slate-950 px-3 py-1.5 border border-slate-800 rounded-lg">
                    <span class="w-2 h-2 rounded-full bg-cyan-400 animate-ping"></span>
                    <span>READY TO RUN</span>
                </div>
            </div>
        </header>

        <main class="max-w-4xl w-full mx-auto p-4 flex-grow flex flex-col justify-center my-4">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl relative overflow-hidden flex flex-col gap-4">
                <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-cyan-500 via-blue-500 to-transparent"></div>
                
                <div class="flex justify-between items-center">
                    <h2 class="text-md font-bold text-slate-300 tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-paste text-cyan-400"></i> PASTE KODE HTML KAMU DI BAWAH:
                    </h2>
                    <div class="flex gap-2">
                        <button onclick="clearInput()" class="px-3 py-1 text-xs font-code bg-slate-950 border border-slate-800 text-rose-400 hover:bg-rose-500/10 rounded-lg transition">
                            <i class="fa-solid fa-eraser"></i> Clear
                        </button>
                        <button onclick="loadSample()" class="px-3 py-1 text-xs font-code bg-slate-950 border border-slate-800 text-amber-400 hover:bg-amber-500/10 rounded-lg transition">
                            <i class="fa-solid fa-file-code"></i> Contoh
                        </button>
                    </div>
                </div>

                <textarea id="rawHtmlCode" placeholder="" class="w-full h-80 bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs font-code text-emerald-400 focus:outline-none focus:border-cyan-500 transition resize-none leading-relaxed shadow-inner"></textarea>
                
                <button onclick="masukFullscreen()" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 rounded-xl transition duration-300 shadow-[0_4px_15px_rgba(6,182,212,0.3)] flex items-center justify-center gap-2 text-md tracking-wider font-neon">
                    <i class="fa-solid fa-play animate-bounce text-xs"></i> LAUNCH SYSTEM (FULL SCREEN)
                </button>
            </div>
        </main>

        <footer class="text-center py-4 text-[10px] text-slate-600 font-mono tracking-widest uppercase border-t border-slate-900">
            &copy; 2026 XTMODEPRO // FULLSCREEN VIEW SYSTEM ENGINE
        </footer>
    </div>

    <script>
        // FUNGSI UTAMA: MENYUNTIKKAN KODE DAN MEMBUKA MODE FULLSCREEN
        function masukFullscreen() {
            const kodeStr = document.getElementById('rawHtmlCode').value.trim();
            
            if (!kodeStr) {
                alert('⚠️ Gagal mengeksekusi! Harap paste kode HTML terlebih dahulu!');
                return;
            }

            const wrapper = document.getElementById('wrapper-fullscreen');
            const frame = document.getElementById('frameFullscreen');
            
            // Tampilkan container fullscreen, sembunyikan dashboard utama
            wrapper.classList.remove('hidden');
            document.getElementById('menu-utama').classList.add('hidden');

            try {
                // Proses render kode ke dalam frame secara lokal
                const frameDoc = frame.contentDocument || frame.contentWindow.document;
                frameDoc.open();
                frameDoc.write(kodeStr);
                frameDoc.close();
            } catch (error) {
                alert('🚨 Terjadi error saat memproses struktur kode!');
                console.error(error);
            }
        }

        // FUNGSI KEMBALI KEU MENU UTAMA
        function keluarFullscreen() {
            const wrapper = document.getElementById('wrapper-fullscreen');
            const frame = document.getElementById('frameFullscreen');
            
            // Sembunyikan fullscreen, munculkan kembali dashboard utama
            wrapper.classList.add('hidden');
            document.getElementById('menu-utama').classList.remove('hidden');

            // Kosongkan isi frame agar memori perangkat kembali bersih dan hemat ram
            const frameDoc = frame.contentDocument || frame.contentWindow.document;
            frameDoc.open();
            frameDoc.write('');
            frameDoc.close();
        }

        // FUNGSI MENGHAPUS INPUT
        function clearInput() {
            document.getElementById('rawHtmlCode').value = '';
        }

        // KODE CONTOH BIAR KAMU BISA LANGSUNG TES BEGITU DIBUKA
        function loadSample() {
            document.getElementById('rawHtmlCode').value = `<!DOCTYPE html>
<html>
<head>
    <title>Situs Tes</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding-top: 15%; }
        h1 { color: #00ffcc; font-size: 3rem; text-shadow: 0 0 10px #00ffcc; }
        p { color: #888; }
    </style>
</head>
<body>
    <h1>SYSTEM SUKSES INJECT</h1>
    <p>Ini adalah tampilan halaman penuh (Full-Screen) dari HTML yang kamu paste.</p>
</body>
</html>`;
        }
    </script>
</body>
</html>
