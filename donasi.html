<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Mama Bernyanyi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff758c;
            --secondary-purple: #7158e2;
            --bg-gradient: linear-gradient(135deg, #fad0c4 0%, #ffd1ff 100%);
            --white: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--white);
            max-width: 400px;
            width: 100%;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        /* Hiasan Not Balok */
        .music-note {
            position: absolute;
            font-size: 24px;
            color: var(--primary-pink);
            opacity: 0.3;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #444;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-trakteer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--primary-pink);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(255, 117, 140, 0.3);
        }

        .btn-trakteer:hover {
            transform: translateY(-3px);
            background: #ff5e78;
            box-shadow: 0 12px 20px rgba(255, 117, 140, 0.4);
        }

        .tiktok-link {
            display: block;
            margin-top: 20px;
            color: var(--secondary-purple);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .heart {
            color: #ff4757;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="music-note" style="top: 20px; left: 30px;">♪</span>
        <span class="music-note" style="top: 50px; right: 40px; animation-delay: 1s;">♫</span>
        
        <div class="avatar-container">
            🎤
        </div>

        <h1>Cut Cita</h1>
        <p>HALO FOLOWER CUT CITA BANTU DONASI NYA YA BIAR TAMBAH SEMAGAT. <span class="heart">♥</span></p>

        <a href="https://trakteer.id/cut_nur_akmal?t=1776968546547" target="_blank" class="btn-trakteer">
            DONASI SEKARANG
        </a>

        <a href="#" class="tiktok-link">TikTok @nantavip9d</a>
    </div>

</body>
</html>
