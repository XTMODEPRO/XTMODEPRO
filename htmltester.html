<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTMODEPRO - HTML Tester</title>
    <style>
        :root {
            --bg-pure: #000000;
            --bg-card: #090a0f;
            --bg-input: #050608;
            --accent-cyan: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.3);
            --text-muted: #4e5563;
            --border-card: #141722;
            --accent-red: #ff4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-pure);
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .title-neon {
            font-size: 26px;
            font-weight: 800;
            color: var(--accent-cyan);
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--accent-glow);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Card Panel */
        .card-panel {
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-left: 4px solid var(--accent-cyan);
            border-radius: 16px;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 480px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-label {
            color: var(--accent-cyan);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Tombol Hapus All */
        .btn-clear-all {
            background: none;
            border: none;
            color: var(--accent-red);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .btn-clear-all:hover {
            opacity: 0.8;
        }

        /* Editor Input */
        .editor-container {
            flex: 1;
            position: relative;
        }

        .textarea-input {
            width: 100%;
            height: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-card);
            border-radius: 10px;
            padding: 15px;
            color: #e2e8f0;
            font-family: monospace;
            font-size: 13px;
            resize: none;
            outline: none;
        }

        .textarea-input:focus {
            border-color: rgba(0, 255, 204, 0.4);
        }

        /* Anti-Lag File Display */
        .file-zone {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-input);
            border: 1px dashed rgba(0, 255, 204, 0.3);
            border-radius: 10px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            z-index: 5;
        }

        .file-icon {
            width: 60px;
            height: 60px;
            border: 2px solid var(--accent-cyan);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-cyan);
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .file-name {
            font-size: 13px;
            color: #ffffff;
            font-weight: 500;
            text-align: center;
            max-width: 80%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-remove-file {
            font-size: 11px;
            color: var(--accent-red);
            cursor: pointer;
            background: none;
            border: none;
            text-decoration: underline;
        }

        /* Buttons */
        .btn-import {
            background-color: transparent;
            border: 1px dashed var(--text-muted);
            color: #ffffff;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .btn-import:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .btn-deploy {
            background-color: var(--accent-cyan);
            color: #000000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2);
            text-align: center;
            margin-top: auto;
        }

        /* Preview Panel */
        .preview-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.25s ease-out;
            display: flex;
            flex-direction: column;
        }

        body.show-preview .preview-panel {
            transform: translateY(0);
        }

        .preview-header {
            background-color: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            padding: 12px 20px;
            display: flex;
            align-items: center;
        }

        .btn-back {
            background-color: #1a1a1a;
            color: #ffffff;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .preview-title {
            color: #888;
            font-size: 12px;
            margin-left: 15px;
            letter-spacing: 1px;
        }

        .iframe-container {
            flex: 1;
            width: 100%;
            background-color: #ffffff;
            position: relative;
        }

        #file-input-hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-section">
            <div class="title-neon">XTMODEPRO</div>
            <div class="subtitle">Advanced HTML Tester</div>
        </div>

        <div class="card-panel">
            <div class="form-group">
                <label class="form-label">Source File (Opsional)</label>
                <button class="btn-import" onclick="triggerImport()">IMPORT FILE HTML</button>
                <input type="file" id="file-input-hidden" accept=".html,.txt">
            </div>

            <div class="form-group" style="flex: 1; display: flex; flex-direction: column;">
                <div class="label-container">
                    <label class="form-label" id="editor-label">Paste Script HTML</label>
                    <button class="btn-clear-all" id="btn-clear-text" onclick="clearAllText()">[ CLEAR ALL TEKS ]</button>
                </div>
                <div class="editor-container">
                    <textarea id="html-textarea" class="textarea-input" placeholder="Paste kode HTML Anda di sini..."></textarea>
                    
                    <div id="file-display-zone" class="file-zone">
                        <div class="file-icon">HTML</div>
                        <div class="file-name" id="file-name-text">index.html</div>
                        <button class="btn-remove-file" onclick="clearImportedFile()">Hapus & tulis teks manual</button>
                    </div>
                </div>
            </div>

            <button class="btn-deploy" onclick="executeHTML()">Deploy & Run HTML</button>
        </div>
    </div>

    <div class="preview-panel" id="preview-panel">
        <div class="preview-header">
            <button class="btn-back" onclick="closePreview()">← KEMBALI</button>
            <div class="preview-title">LIVE PREVIEW MODE</div>
        </div>
        <div class="iframe-container" id="iframe-box"></div>
    </div>

    <script>
        let memoryFileContent = "";
        let isFileLoaded = false;

        const fileInputHidden = document.getElementById('file-input-hidden');
        const htmlTextarea = document.getElementById('html-textarea');
        const fileDisplayZone = document.getElementById('file-display-zone');
        const fileNameText = document.getElementById('file-name-text');
        const editorLabel = document.getElementById('editor-label');
        const previewPanel = document.getElementById('preview-panel');
        const iframeBox = document.getElementById('iframe-box');
        const btnClearText = document.getElementById('btn-clear-text');

        // AUDIO MEMORY SYSTEM (Offline Base64)
        const clickSound = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAQA"); 
        clickSound.volume = 0.5;

        function playSound() {
            clickSound.currentTime = 0;
            clickSound.play().catch(() => {});
        }

        function triggerImport() {
            playSound();
            fileInputHidden.click();
        }

        // Anti-Lag File Loader
        fileInputHidden.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                memoryFileContent = evt.target.result;
                isFileLoaded = true;

                fileNameText.innerText = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
                htmlTextarea.style.display = "none";
                fileDisplayZone.style.display = "flex";
                editorLabel.innerText = "File Terkunci (Anti-Lag Aktif)";
                btnClearText.style.display = "none"; // Sembunyikan hapus teks saat mode file aktif
            };
            reader.readAsText(file);
        });

        // Fungsi Membersihkan Semua Isi Teks Manual
        function clearAllText() {
            playSound();
            htmlTextarea.value = "";
            htmlTextarea.focus();
        }

        function clearImportedFile() {
            playSound();
            memoryFileContent = "";
            isFileLoaded = false;
            fileInputHidden.value = "";
            
            fileDisplayZone.style.display = "none";
            htmlTextarea.style.display = "block";
            editorLabel.innerText = "Paste Script HTML";
            btnClearText.style.display = "block"; // Munculkan kembali tombol hapus teks
        }

        function executeHTML() {
            playSound();
            let codeToRender = isFileLoaded ? memoryFileContent : htmlTextarea.value;

            iframeBox.innerHTML = "";
            const newIframe = document.createElement('iframe');
            newIframe.id = "preview-frame";
            newIframe.style.width = "100%";
            newIframe.style.height = "100%";
            newIframe.style.border = "none";
            newIframe.setAttribute("sandbox", "allow-scripts allow-same-origin");
            iframeBox.appendChild(newIframe);

            const iframeDoc = newIframe.contentDocument || newIframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(codeToRender);
            iframeDoc.close();

            document.body.classList.add('show-preview');
        }

        function closePreview() {
            playSound();
            document.body.classList.remove('show-preview');
            iframeBox.innerHTML = "";
        }
    </script>
</body>
</html>
