
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support XTMODEPRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 24px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #38bdf8; }
        p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
        .qr-box {
            background: white;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        img { width: 100%; height: auto; border-radius: 8px; display: block; }
        
        .btn {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .btn:hover { background: #7dd3fc; }
        
        .footer { font-size: 0.8rem; color: #475569; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>XTMODEPRO</h1>
        <p>Dukung pengembangan mod dan operasional saya agar tetap konsisten memberikan update terbaik.</p>
        
        <div class="qr-box">
            <img id="qrImage" src="https://files.catbox.moe/yeyxyp.jpg" alt="QRIS Donation">
        </div>
        
        <a href="https://files.catbox.moe/yeyxyp.jpg" download="QR_Donasi_XTMODEPRO.jpg" class="btn">Download QR Code</a>
        
        <div class="footer">
            Terima kasih atas apresiasi Anda.
        </div>
    </div>
</body>
</html>
